name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install server dependencies
      - name: Install server dependencies
        run: cd server && npm ci

      # Install desktop dependencies
      - name: Install desktop dependencies
        run: cd desktop && npm ci

      # Build desktop app
      # On macOS: if Apple Developer secrets are set, the app is signed
      # with Developer ID and notarized with Apple notarytool.
      # Otherwise the build still succeeds producing an unsigned DMG.
      - name: Build desktop app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Developer ID Application certificate, .p12)
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # macOS notarization (via notarytool)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd desktop
          npm run build:web
          npx tsc -p electron/tsconfig.json
          if [ "${{ matrix.os }}" = "macos-latest" ] && [ -n "$APPLE_ID" ] && [ -n "$CSC_LINK" ]; then
            echo "Building macOS app with code signing + notarization"
            npx electron-builder --publish always -c.mac.notarize=true
          else
            echo "Building without macOS signing/notarization"
            npx electron-builder --publish always
          fi

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.yml

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'

      - name: Build APK
        run: |
          cd flutter_app
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
