name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      # Install server dependencies
      - name: Install server dependencies
        run: cd server && npm ci

      # Install desktop dependencies
      - name: Install desktop dependencies
        run: cd desktop && npm ci

      # Build desktop app
      # On macOS: if Apple Developer secrets are set, the app is signed
      # with Developer ID and notarized with Apple notarytool.
      # Otherwise the build still succeeds producing an unsigned DMG.
      #
      # IMPORTANT: GitHub Actions expands missing secrets to empty strings.
      # electron-builder sees an empty CSC_LINK as "try to use file path ''"
      # which resolves to the cwd — breaking the build with "desktop not a
      # file". We explicitly unset the empty vars before invoking electron.
      - name: Build desktop app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Developer ID Application certificate, .p12)
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # macOS notarization (via notarytool)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Drop empty signing vars so electron-builder doesn't try to use them
          [ -z "${CSC_LINK:-}" ] && unset CSC_LINK || true
          [ -z "${CSC_KEY_PASSWORD:-}" ] && unset CSC_KEY_PASSWORD || true
          [ -z "${APPLE_ID:-}" ] && unset APPLE_ID || true
          [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && unset APPLE_APP_SPECIFIC_PASSWORD || true
          [ -z "${APPLE_TEAM_ID:-}" ] && unset APPLE_TEAM_ID || true

          cd desktop
          npm run build:web
          npx tsc -p electron/tsconfig.json
          if [ "${{ matrix.os }}" = "macos-latest" ] && [ -n "${APPLE_ID:-}" ] && [ -n "${CSC_LINK:-}" ]; then
            echo "Building macOS app with code signing + notarization"
            npx electron-builder --publish always -c.mac.notarize=true
          else
            echo "Building without macOS signing/notarization"
            npx electron-builder --publish always
          fi

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.yml

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'

      - name: Build APK
        run: |
          cd flutter_app
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: flutter-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
